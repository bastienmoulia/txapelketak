name: Deploy Firebase Functions

on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TXAPELKETAK_AC529 }}
      - name: Install root dependencies
        run: npm ci
      - name: Install Functions dependencies
        run: npm run functions:install
      - name: Build Functions
        run: npm run functions:build
      - name: Deploy Functions
        run: npx firebase-tools deploy --only functions --project txapelketak-ac529 --non-interactive
