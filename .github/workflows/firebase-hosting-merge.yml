# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Start Firebase emulators
        run: npx firebase emulators:start --only firestore &
      - name: Wait for emulators to be ready
        run: |
          for attempt in {1..30}; do
            if (echo > /dev/tcp/localhost/8080) >/dev/null 2>&1; then
              echo "Firestore emulator is ready on localhost:8080."
              exit 0
            fi
            echo "Waiting for Firestore emulator on localhost:8080..."
            sleep 1
          done
          echo "Firestore emulator did not become ready in time." >&2
          exit 1
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --watch=false
      - name: E2E
        run: npm run e2e
        env:
          FIREBASE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
      - name: Build
        run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TXAPELKETAK_AC529 }}
          channelId: live
          projectId: txapelketak-ac529
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
