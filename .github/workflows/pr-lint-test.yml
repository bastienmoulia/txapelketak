name: PR Quality Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint_and_test:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Start Firebase emulators
        continue-on-error: true
        run: |
          npx --yes firebase-tools emulators:start --only firestore --project txapelketak-ac529 --import=.firebase/emulator-data > firebase-emulators.log 2>&1 &
          echo $! > firebase-emulators.pid

          for attempt in {1..90}; do
            if ! kill -0 "$(cat firebase-emulators.pid)" >/dev/null 2>&1; then
              echo "Firestore emulator process exited unexpectedly." >&2
              tail -n 200 firebase-emulators.log || true
              exit 1
            fi

            if (echo > /dev/tcp/127.0.0.1/8080) >/dev/null 2>&1; then
              echo "Firestore emulator is ready on localhost:8080."
              exit 0
            fi

            echo "Waiting for Firestore emulator on localhost:8080..."
            sleep 1
          done

          echo "Firestore emulator did not become ready in time." >&2
          tail -n 200 firebase-emulators.log || true
          exit 1
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --watch=false
      - name: E2E
        continue-on-error: true
        run: npm run e2e
      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
