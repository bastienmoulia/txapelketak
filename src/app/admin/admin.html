<p-toast />
@if (loading()) {
  <div class="state state-loading" data-testid="admin-loading">
    <p-progress-spinner
      strokeWidth="4"
      fill="transparent"
      animationDuration=".8s"
      [style]="{ width: '2.5rem', height: '2.5rem' }"
    />
    <p-message severity="info" variant="simple">{{ 'admin.loading' | transloco }}</p-message>
  </div>
} @else if (accessDenied()) {
  <div class="state" data-testid="admin-denied">
    <p-message severity="error" icon="pi pi-lock">
      {{ 'admin.denied' | transloco }}
    </p-message>
    <p-button
      [label]="'admin.backHome' | transloco"
      icon="pi pi-home"
      severity="secondary"
      [outlined]="true"
      routerLink="/"
    />
  </div>
} @else if (tournament() && user()) {
  <app-tournament-header [tournament]="tournament()!" [admin]="true" />
  <app-admin-types [tournament]="tournament()!" />
} @else {
  <p-message severity="warn" icon="pi pi-exclamation-triangle">
    {{ 'admin.notFound' | transloco }}
  </p-message>
}
