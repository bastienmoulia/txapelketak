<p-toast />
@if (loading()) {
  <div class="flex flex-col gap-4 items-start" data-testid="admin-loading">
    <p-progress-spinner
      strokeWidth="4"
      fill="transparent"
      animationDuration=".8s"
      [style]="{ width: '2.5rem', height: '2.5rem' }"
    />
    <p-message severity="info" variant="simple">{{ 'admin.loading' | transloco }}</p-message>
  </div>
} @else if (accessDenied()) {
  <div class="flex flex-col gap-4" data-testid="admin-denied">
    <p-message severity="error">
      <ng-template #icon><lucide-icon name="lock" [size]="16" /></ng-template>
      {{ 'admin.denied' | transloco }}
    </p-message>
    <p-button
      [label]="'admin.backHome' | transloco"
     
      severity="secondary"
      [outlined]="true"
      routerLink="/"
    >
      <ng-template #icon><lucide-icon name="house" [size]="16" /></ng-template>
    </p-button>
  </div>
} @else if (tournament() && user()) {
  <app-tournament-header [tournament]="tournament()!" [role]="user()!.role" />
  <app-tournament-tabs [tournament]="tournament()!" [role]="user()!.role" />
  <router-outlet />
} @else {
  <p-message severity="warn">
    <ng-template #icon><lucide-icon name="triangle-alert" [size]="16" /></ng-template>
    {{ 'admin.notFound' | transloco }}
  </p-message>
}
