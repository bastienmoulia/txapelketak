<p-tabs value="poules">
  <p-tablist>
    <p-tab value="poules">{{ 'admin.tabs.poules' | transloco }}</p-tab>
    <p-tab value="teams">{{ 'admin.tabs.teams' | transloco }}</p-tab>
  </p-tablist>

  <p-tabpanels>
    <p-tabpanel value="poules">
      <p>admin-poules works!</p>
    </p-tabpanel>
    <p-tabpanel value="teams">
      <app-admin-teams
        [teams]="teams()"
        (saveTeam)="onSaveTeam($event)"
        (saveTeams)="onSaveTeams($event)"
        (deleteTeam)="onDeleteTeam($event)"
      />
    </p-tabpanel>
  </p-tabpanels>
</p-tabs>
