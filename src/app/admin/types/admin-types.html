@switch (tournament().type) {
  @case ('poules') {
    <app-admin-poules [tournament]="tournament()" [role]="role()" />
  }
  @case ('finale') {
    <app-admin-finale [tournamentData]="finaleData()" />
  }
  @case ('poules_finale') {
    <app-admin-poules-finale [tournamentData]="poulesFinaleData()" />
  }
  @default {
    <p>{{ 'admin.unknownType' | transloco }} : {{ tournament().type }}</p>
  }
}
