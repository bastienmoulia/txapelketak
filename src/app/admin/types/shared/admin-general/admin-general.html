<p-toast />

<form (ngSubmit)="onSave()" class="flex flex-col gap-4 mx-3">
  <p-floatlabel variant="on">
    <input
      pInputText
      id="tournament-name"
      name="name"
      class="w-full"
      autocomplete="off"
      [(ngModel)]="name"
      [disabled]="!isEditing()"
    />
    <label for="tournament-name">{{ 'admin.general.name' | transloco }}</label>
  </p-floatlabel>

  <p-floatlabel variant="on">
    <textarea
      pTextarea
      id="tournament-description"
      name="description"
      class="w-full"
      rows="8"
      [(ngModel)]="description"
      [disabled]="!isEditing()"
    ></textarea>
    <label for="tournament-description">{{ 'admin.general.description' | transloco }}</label>
  </p-floatlabel>
  <small class="text-[var(--p-text-muted-color)]">
    {{ 'tournaments.new.step1.descriptionHelp' | transloco }}
  </small>

  <p-floatlabel variant="on">
    <p-inputnumber
      inputId="tournament-game-duration"
      name="gameDurationMinutes"
      [ngModel]="gameDurationMinutes()"
      (ngModelChange)="gameDurationMinutes.set($event)"
      [min]="1"
      [max]="1440"
      [style]="{ width: '100%' }"
      [inputStyle]="{ width: '100%' }"
      [disabled]="!isEditing()"
    />
    <label for="tournament-game-duration">{{
      'admin.general.gameDurationMinutes' | transloco
    }}</label>
  </p-floatlabel>
  <small class="text-[var(--p-text-muted-color)]">
    {{ 'admin.general.gameDurationHelp' | transloco }}
  </small>

  <div class="flex gap-2">
    @if (isEditing()) {
      <p-button
        type="button"
        severity="secondary"
        [label]="'shared.actions.cancel' | transloco"
        [disabled]="isSaving()"
        (onClick)="onCancel()"
      />
      <p-button
        type="submit"
        icon="pi pi-save"
        [label]="'shared.actions.save' | transloco"
        [loading]="isSaving()"
        [disabled]="!name() || !gameDurationMinutes()"
      />
    } @else {
      <p-button
        type="button"
        severity="secondary"
        [outlined]="true"
        icon="pi pi-pencil"
        [label]="'shared.actions.edit' | transloco"
        (onClick)="onEdit()"
      />
    }
  </div>

  <div class="flex flex-col gap-2 pt-2">
    <label class="text-sm font-medium" for="tournament-calendar-url">{{
      'admin.general.calendarUrl' | transloco
    }}</label>
    <input
      pInputText
      id="tournament-calendar-url"
      class="w-full"
      [value]="calendarUrl()"
      readonly
    />
    <small class="text-[var(--p-text-muted-color)]">
      {{ 'admin.general.calendarHelp' | transloco }}
    </small>
    <div>
      <a
        pButton
        class="inline-flex"
        [href]="calendarUrl()"
        target="_blank"
        rel="noopener noreferrer"
      >
        {{ 'admin.general.openCalendar' | transloco }}
      </a>
    </div>
  </div>
</form>
