<div class="flex flex-col gap-6 mx-3">
  <div class="flex flex-col gap-2">
    <h3 class="text-lg font-semibold">{{ 'admin.importExport.exportTitle' | transloco }}</h3>
    <p class="text-surface-500">{{ 'admin.importExport.exportDescription' | transloco }}</p>
    <div>
      <p-button
        type="button"
        icon="pi pi-download"
        [label]="'admin.importExport.exportButton' | transloco"
        (onClick)="onExport()"
      />
    </div>
  </div>

  <p-divider />

  <div class="flex flex-col gap-2">
    <h3 class="text-lg font-semibold">{{ 'admin.importExport.importTitle' | transloco }}</h3>
    <p class="text-surface-500">{{ 'admin.importExport.importDescription' | transloco }}</p>
    <div>
      <input
        #fileInput
        type="file"
        accept=".yaml,.yml"
        class="hidden"
        (change)="onImportFileChange($event)"
      />
      <p-button
        type="button"
        icon="pi pi-upload"
        severity="secondary"
        [label]="'admin.importExport.importButton' | transloco"
        (onClick)="fileInput.click()"
      />
    </div>
    @if (importError()) {
      <p-message severity="error">{{ importError() }}</p-message>
    }
  </div>
</div>
