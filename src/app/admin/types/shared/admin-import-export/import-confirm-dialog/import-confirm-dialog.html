<p>{{ 'admin.importExport.importConfirmMessage' | transloco }}</p>
<ul class="mt-3 list-disc pl-5 text-surface-600">
  <li>{{ 'admin.importExport.teamsCount' | transloco: { count: data.teamsCount } }}</li>
  <li>{{ 'admin.importExport.seriesCount' | transloco: { count: data.seriesCount } }}</li>
</ul>

<div class="p-dialog-footer px-0! mt-5">
  <p-button [label]="'shared.actions.cancel' | transloco" severity="secondary" (onClick)="onCancel()" />
  <p-button [label]="'admin.importExport.importConfirm' | transloco" severity="danger" (onClick)="onConfirm()" />
</div>
