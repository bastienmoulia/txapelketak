<div class="admin-teams-actions">
  <p-button
    type="button"
    icon="pi pi-plus"
    [label]="'admin.teams.add' | transloco"
    [ariaLabel]="'admin.teams.add' | transloco"
    (onClick)="onAddTeam()"
    data-testid="add-team-button"
  />
  <p-button
    type="button"
    icon="pi pi-plus-circle"
    [label]="'admin.teams.addBulk' | transloco"
    severity="secondary"
    [ariaLabel]="'admin.teams.addBulkAria' | transloco"
    (onClick)="onAddTeams()"
    data-testid="add-teams-bulk-button"
  />
  <p-dialog [header]="(isEditing() ? 'admin.teams.dialogEdit' : 'admin.teams.dialogAdd') | transloco" [modal]="true" [(visible)]="visible">
    <form (submit)="$event.preventDefault(); onSaveTeam()">
      <div class="mb-4">
        <p-floatlabel variant="on">
          <input
            pInputText
            [formField]="teamForm.name"
            id="name"
            class="w-full"
            autocomplete="off"
          />
          <label for="name">{{ 'shared.table.columns.name' | transloco }}</label>
        </p-floatlabel>
      </div>
      <div class="flex justify-end gap-2">
        <p-button
          [label]="'shared.actions.cancel' | transloco"
          severity="secondary"
          (click)="visible.set(false)"
        />
        <p-button type="submit" [label]="'shared.actions.save' | transloco" />
      </div>
    </form>
  </p-dialog>

  <p-dialog
    [header]="'admin.teams.dialogAddBulk' | transloco"
    [modal]="true"
    [(visible)]="visibleBulk"
  >
    <form (submit)="$event.preventDefault(); onSaveTeams()">
      <div class="mb-4">
        <p-floatlabel variant="on">
          <textarea
            pTextarea
            id="bulk-names"
            class="w-full"
            rows="6"
            [placeholder]="'admin.teams.bulkPlaceholder' | transloco"
            name="bulk-names"
            [ngModel]="bulkText()"
            (ngModelChange)="bulkText.set($event)"
          ></textarea>
          <label for="bulk-names">{{ 'admin.teams.bulkLabel' | transloco }}</label>
        </p-floatlabel>
      </div>
      <div class="flex justify-end gap-2">
        <p-button
          [label]="'shared.actions.cancel' | transloco"
          severity="secondary"
          (click)="visibleBulk.set(false)"
        />
        <p-button
          type="submit"
          [label]="'shared.actions.save' | transloco"
        />
      </div>
    </form>
  </p-dialog>
</div>

@if (teams().length > 0) {
  <p-table [value]="teams()" class="p-datatable-striped">
    <ng-template #header>
      <tr>
        <th>{{ 'shared.table.columns.name' | transloco }}</th>
        <th class="actions-column">{{ 'shared.table.columns.actions' | transloco }}</th>
      </tr>
    </ng-template>

    <ng-template #body let-team>
      <tr>
        <td>{{ team.name }}</td>
        <td>
          <div class="row-actions">
            <p-button
              type="button"
              size="small"
              severity="secondary"
              [outlined]="true"
              icon="pi pi-pencil"
              [label]="'shared.actions.edit' | transloco"
              [ariaLabel]="'admin.teams.editAria' | transloco"
              (onClick)="onEditTeam(team)"
              data-testid="edit-team-button"
            />
            <p-button
              type="button"
              size="small"
              severity="danger"
              [outlined]="true"
              icon="pi pi-trash"
              [label]="'shared.actions.delete' | transloco"
              [ariaLabel]="'admin.teams.deleteAria' | transloco"
              (onClick)="onDeleteTeam(team)"
              data-testid="delete-team-button"
            />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td class="text-center">{{ 'admin.teams.empty' | transloco }}</td>
      </tr>
    </ng-template>
  </p-table>
} @else {
  <p-message severity="info" variant="simple" class="mt-4">
    {{ 'admin.teams.empty' | transloco }}
  </p-message>
}
