<div class="admin-teams-actions">
  <p-button
    type="button"
    icon="pi pi-plus"
    label="Ajouter une équipe"
    ariaLabel="Ajouter une équipe"
    (onClick)="onAddTeam()"
    data-testid="add-team-button"
  />
  <p-dialog header="Ajouter une équipe" [modal]="true" [(visible)]="visible">
    <div class="flex items-center gap-4 mb-4">
      <label for="name" class="font-semibold w-24">Nom</label>
      <input pInputText id="name" class="flex-auto" autocomplete="off" />
    </div>
    <div class="flex items-center gap-4 mb-8">
      <label for="email" class="font-semibold w-24">Email</label>
      <input pInputText id="email" class="flex-auto" autocomplete="off" />
    </div>
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" severity="secondary" (click)="visible.set(false)" />
      <p-button label="Save" (click)="visible.set(false)" />
    </div>
  </p-dialog>
</div>

@if (teams().length > 0) {
  <p-table [value]="teams()" class="p-datatable-striped">
    <ng-template #header>
      <tr>
        <th>{{ 'shared.table.columns.name' | transloco }}</th>
        <th class="actions-column">Actions</th>
      </tr>
    </ng-template>

    <ng-template #body let-team>
      <tr>
        <td>{{ team.name }}</td>
        <td>
          <div class="row-actions">
            <p-button
              type="button"
              size="small"
              severity="secondary"
              [outlined]="true"
              icon="pi pi-pencil"
              label="Modifier"
              ariaLabel="Modifier l'équipe"
              (onClick)="onEditTeam(team)"
              data-testid="edit-team-button"
            />
            <p-button
              type="button"
              size="small"
              severity="danger"
              [outlined]="true"
              icon="pi pi-trash"
              label="Supprimer"
              ariaLabel="Supprimer l'équipe"
              (onClick)="onDeleteTeam(team)"
              data-testid="delete-team-button"
            />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td class="text-center">{{ 'admin.teams.empty' | transloco }}</td>
      </tr>
    </ng-template>
  </p-table>
} @else {
  <p-message severity="info" variant="simple" class="mt-4">
    {{ 'admin.teams.empty' | transloco }}
  </p-message>
}
