<div class="mx-3 flex flex-col gap-4">
  <div class="flex flex-wrap gap-2 items-end">
    <p-datepicker
      [ngModel]="newSlotDate()"
      (ngModelChange)="newSlotDate.set($event)"
      [showTime]="true"
      [showIcon]="true"
      [showButtonBar]="true"
      [showSeconds]="false"
      [stepMinute]="5"
      [dateFormat]="datePickerFormat()"
      [firstDayOfWeek]="firstDayOfWeek()"
      [placeholder]="datePlaceholder()"
      appendTo="body"
      (onShow)="onDatepickerShow()"
      data-testid="time-slot-datepicker"
    />
    <p-button
     
      [label]="'admin.timeSlots.add' | transloco"
      [disabled]="!newSlotDate()"
      [loading]="isSaving()"
      (onClick)="onAddTimeSlot()"
      data-testid="add-time-slot-button"
    >
      <ng-template #icon><lucide-icon name="plus" [size]="16" /></ng-template>
    </p-button>
  </div>

  @if (sortedTimeSlots().length === 0) {
    <p class="text-[var(--p-text-muted-color)] text-sm">
      {{ 'admin.timeSlots.empty' | transloco }}
    </p>
  } @else {
    <ul class="time-slots-list" data-testid="time-slots-list">
      @for (slot of sortedTimeSlots(); track slot.ref.id) {
        <li class="time-slot-pill">
          <span class="time-slot-pill__date">{{
            slot.date | date: 'short' : undefined : dateLocale()
          }}</span>
          <p-button
           
            [ariaLabel]="'admin.timeSlots.deleteAria' | transloco"
            [pTooltip]="'admin.timeSlots.deleteAria' | transloco"
            tooltipPosition="top"
            severity="danger"
            size="small"
            [rounded]="true"
            [text]="true"
            (onClick)="onDeleteTimeSlot(slot.ref)"
            data-testid="delete-time-slot-button"
          >
            <ng-template #icon><lucide-icon name="trash-2" [size]="16" /></ng-template>
          </p-button>
        </li>
      }
    </ul>
  }
</div>
