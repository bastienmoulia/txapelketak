@if (role() === 'admin') {
  <div class="flex flex-col gap-8">
    <section>
      <h2 class="text-xl font-semibold mb-4! mx-3!">
        {{ 'admin.general.title' | transloco }}
      </h2>
      <app-admin-general [tournament]="tournament()!" />
    </section>
    <section>
      <h2 class="text-xl font-semibold mb-4! mx-3!">
        {{ 'admin.timeSlots.title' | transloco }}
      </h2>
      <app-admin-time-slots [tournament]="tournament()!" [timeSlots]="timeSlots()" />
    </section>
    <section>
      <h2 class="text-xl font-semibold mb-4! mx-3!">{{ 'admin.tabs.users' | transloco }}</h2>
      <app-admin-users [tournament]="tournament()!" [currentUser]="currentUser()" />
    </section>
    <section>
      <h2 class="text-xl font-semibold mb-4! mx-3!">
        {{ 'admin.tabs.importExport' | transloco }}
      </h2>
      <app-admin-import-export
        [tournament]="tournament()!"
        [teams]="teams()"
        [series]="series()"
        [timeSlots]="timeSlots()"
      />
    </section>
    <section>
      <app-admin-delete-tournament [tournament]="tournament()!" />
    </section>
  </div>
} @else {
  <p-message severity="error" icon="pi pi-lock" class="mx-3">
    {{ 'admin.denied' | transloco }}
  </p-message>
}
