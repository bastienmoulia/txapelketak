<div class="home-container">
  <!-- Hero Section -->
  <div class="hero-section">
    <h1>Txapelketak</h1>
    <p class="hero-subtitle">Gérez vos tournois simplement et efficacement</p>
    <p-button
      label="Créer un tournoi"
      icon="pi pi-plus"
      routerLink="/tournaments/new"
    />
  </div>

  <!-- How it works -->
  <section class="features-section">
    <h2>Comment ça marche ?</h2>
    <div class="features-grid">
      @for (feature of features(); track feature.title) {
      <p-card styleClass="feature-card">
        <div class="feature-content">
          <i [class]="feature.icon + ' feature-icon'"></i>
          <h3>{{ feature.title }}</h3>
          <p>{{ feature.description }}</p>
        </div>
      </p-card>
      }
    </div>
  </section>

  <!-- Tournament List -->
  <section class="tournaments-section">
    <div class="section-header">
      <h2>Tournois</h2>
      <p-button
        label="Créer un tournoi"
        icon="pi pi-plus"
        severity="secondary"
        [outlined]="true"
        routerLink="/tournaments/new"
      />
    </div>
    <p-table [value]="recentTournaments()" class="p-datatable-striped">
      <ng-template #header>
        <tr>
          <th>Nom</th>
          <th>Type</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template #body let-tournament>
        <tr>
          <td>{{ tournament.name }}</td>
          <td>{{ tournament.type }}</td>
          <td>
            <p-tag
              [value]="statusLabel(tournament.status)"
              [severity]="statusSeverity(tournament.status)"
            />
          </td>
          <td>
            <a [routerLink]="tournament | call: getTournamentLink" pButton>
              <span pButtonLabel>Ouvrir</span>
            </a>
          </td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="4" class="text-center">Aucun tournoi disponible</td>
        </tr>
      </ng-template>
    </p-table>
    <div class="see-all-tournaments">
      <p-button
        label="Voir tous les tournois"
        icon="pi pi-list"
        severity="secondary"
        [outlined]="true"
        routerLink="/tournaments"
      />
    </div>
  </section>
</div>
