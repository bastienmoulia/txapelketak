<div class="header-actions flex items-center justify-end gap-3 flex-wrap">
  <p-menu #themeMenu [model]="themeItems()" [popup]="true" appendTo="body" />
  <p-button
    data-testid="theme-button"
    type="button"
    severity="secondary"
    [outlined]="true"
    [icon]="themeIcon()"
    [label]="isMobile() ? undefined : themeLabel()"
    [ariaLabel]="themeLabel()"
    [pTooltip]="isMobile() ? themeLabel() : undefined"
    tooltipPosition="left"
    (onClick)="toggleMenu(themeMenu, $event)"
  />

  <p-menu #languageMenu [model]="languageItems()" [popup]="true" appendTo="body" />
  <p-button
    data-testid="language-button"
    type="button"
    severity="secondary"
    [outlined]="true"
    icon="pi pi-language"
    [label]="isMobile() ? languageCode() : languageLabel()"
    [ariaLabel]="languageLabel()"
    [pTooltip]="languageLabel()"
    tooltipPosition="left"
    (onClick)="toggleMenu(languageMenu, $event)"
  />
</div>
