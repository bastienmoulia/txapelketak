<p-toast />
<section class="max-w-[1200px] mx-auto py-3 px-4">
  <div class="flex items-center justify-between gap-3 max-sm:flex-col max-sm:items-start">
    <h2 class="m-0 text-xl font-bold leading-[1.2]">
      {{ tournament().name }}
      @if (role() === 'admin') {
        <p-badge
          class="ml-2 align-middle"
          severity="danger"
          [value]="'shared.tournamentHeader.admin' | transloco"
          data-testid="admin-badge"
        />
      } @else if (role() === 'organizer') {
        <p-badge
          class="ml-2 align-middle"
          severity="warn"
          [value]="'shared.tournamentHeader.organizer' | transloco"
          data-testid="organizer-badge"
        />
      }
    </h2>

    <div class="flex items-center gap-2 max-sm:w-full max-sm:flex-wrap">
      @if (role() === 'admin') {
        <p-button
          type="button"
          severity="primary"
          icon="pi pi-pencil"
          [label]="'shared.tournamentHeader.edit' | transloco"
          [ariaLabel]="'shared.tournamentHeader.editAria' | transloco"
          data-testid="edit-tournament-button"
          (onClick)="edit()"
        />
      }

      <p-button
        type="button"
        severity="secondary"
        [outlined]="true"
        [icon]="detailsExpanded() ? 'pi pi-chevron-up' : 'pi pi-chevron-down'"
        [label]="
          detailsExpanded()
            ? ('shared.tournamentHeader.hideDetails' | transloco)
            : ('shared.tournamentHeader.showDetails' | transloco)
        "
        [ariaLabel]="
          detailsExpanded()
            ? ('shared.tournamentHeader.hideDetailsAria' | transloco)
            : ('shared.tournamentHeader.showDetailsAria' | transloco)
        "
        (onClick)="toggleDetails()"
      />
    </div>
  </div>

  @if (detailsExpanded()) {
    <div class="mt-3 flex flex-col gap-2" data-testid="tournament-details">
      <div class="flex items-center flex-wrap gap-3">
        <p-tag
          [value]="tournament().status | tournamentStatusLabel"
          [severity]="tournament().status | tournamentStatusSeverity"
        />
      </div>

      @if (tournament().description) {
        <div
          class="m-0 text-[var(--p-text-muted-color)] ql-editor !p-0"
          [innerHTML]="tournament().description"
          data-testid="tournament-description"
        ></div>
      } @else {
        <p class="m-0 text-[var(--p-text-muted-color)]" data-testid="tournament-description">
          {{ 'shared.tournamentHeader.noDescription' | transloco }}
        </p>
      }
    </div>
  }
</section>
