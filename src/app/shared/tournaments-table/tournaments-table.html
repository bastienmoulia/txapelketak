<p-table [value]="tournaments()" class="p-datatable-striped">
  <ng-template #header>
    <tr>
      <th pSortableColumn="name">
        {{ 'shared.table.columns.name' | transloco }} <p-sortIcon field="name" />
      </th>
      <th pSortableColumn="status">
        {{ 'shared.table.columns.status' | transloco }} <p-sortIcon field="status" />
      </th>
      <th>{{ 'shared.table.columns.actions' | transloco }}</th>
    </tr>
  </ng-template>
  <ng-template #body let-tournament>
    <tr>
      <td>{{ tournament.name }}</td>
      <td>
        <p-tag
          [value]="tournament.status | tournamentStatusLabel"
          [severity]="tournament.status | tournamentStatusSeverity"
        />
      </td>
      <td>
        <p-button
          [label]="'shared.table.open' | transloco"
          [routerLink]="getTournamentLink()(tournament)"
          [disabled]="tournament.status === 'paused' || tournament.status === 'waitingValidation'"
        />
      </td>
    </tr>
  </ng-template>
  <ng-template #emptymessage>
    <tr>
      <td colspan="3" class="text-center">{{ 'shared.table.empty' | transloco }}</td>
    </tr>
  </ng-template>
</p-table>
