<div class="max-w-[1200px] mx-auto py-8">
  <div class="flex justify-between items-center mb-6 px-4">
    <h1 class="text-[1.75rem] font-semibold m-0">{{ 'tournaments.list.title' | transloco }}</h1>
    <p-button
      [label]="'tournaments.list.create' | transloco"
      icon="pi pi-plus"
      severity="secondary"
      [outlined]="true"
      (onClick)="createSoonAvailable()"
    />
  </div>
  <app-tournaments-table [tournaments]="tournaments()" [getTournamentLink]="getTournamentLink" />
</div>
