<div class="tournament-list-container">
  <div class="section-header">
    <h1>{{ 'tournaments.list.title' | transloco }}</h1>
    <p-button
      [label]="'tournaments.list.create' | transloco"
      icon="pi pi-plus"
      severity="secondary"
      [outlined]="true"
      (onClick)="createSoonAvailable()"
    />
  </div>
  <app-tournaments-table [tournaments]="tournaments()" [getTournamentLink]="getTournamentLink" />
</div>
