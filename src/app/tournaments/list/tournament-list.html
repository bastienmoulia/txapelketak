<div class="max-w-[1200px] mx-auto py-8">
  <div class="flex justify-between items-center mb-6 px-4">
    <h1 class="text-[1.75rem] font-semibold m-0">{{ 'tournaments.list.title' | transloco }}</h1>
    <p-button
      [label]="'tournaments.list.create' | transloco"
     
      severity="secondary"
      [outlined]="true"
      routerLink="/tournaments/new"
    >
      <ng-template #icon><lucide-icon name="plus" [size]="16" /></ng-template>
    </p-button>
  </div>
  <app-tournaments-table
    [tournaments]="tournaments()"
    [loading]="loading()"
    [error]="error()"
    [firebaseUnavailable]="firebaseUnavailable()"
    [getTournamentLink]="getTournamentLink"
    [attr.data-testid]="loading() ? 'tournament-list-loading' : null"
  />
</div>
