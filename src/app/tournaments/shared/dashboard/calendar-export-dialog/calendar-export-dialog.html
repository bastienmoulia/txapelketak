<form (ngSubmit)="onExport()">
  <div class="flex flex-col gap-4 pt-2">
    <p-floatlabel variant="on">
      <p-select
        inputId="calendarTeam"
        name="calendarTeam"
        [options]="teamOptions()"
        [(ngModel)]="selectedTeamId"
        optionLabel="label"
        optionValue="value"
        [filter]="true"
        [style]="{ width: '100%' }"
        appendTo="body"
      />
      <label for="calendarTeam">{{
        'tournaments.dashboard.calendarExportDialog.selectTeam' | transloco
      }}</label>
    </p-floatlabel>

    <div class="flex justify-end gap-2">
      <p-button
        type="button"
        severity="secondary"
        [label]="'shared.actions.cancel' | transloco"
        (onClick)="onCancel()"
      />
      <p-button
        type="submit"
        icon="pi pi-calendar"
        [label]="'tournaments.dashboard.calendarExportDialog.export' | transloco"
      />
    </div>
  </div>
</form>
