<form>
  <div class="flex flex-col gap-4 pt-2">
    <p-floatlabel variant="on">
      <p-select
        inputId="calendarTeam"
        name="calendarTeam"
        [options]="teamOptions()"
        [(ngModel)]="selectedTeamId"
        optionLabel="label"
        optionValue="value"
        [filter]="true"
        [style]="{ width: '100%' }"
        appendTo="body"
      />
      <label for="calendarTeam">{{
        'tournaments.dashboard.calendarExportDialog.selectTeam' | transloco
      }}</label>
    </p-floatlabel>

    <div class="flex justify-end gap-2">
      <p-button
        type="button"
        severity="secondary"
        [label]="'shared.actions.cancel' | transloco"
        (onClick)="onCancel()"
      />
      <p-button
        type="button"
        icon="pi pi-download"
        severity="secondary"
        [outlined]="true"
        [label]="'tournaments.dashboard.calendarExportDialog.download' | transloco"
        [pTooltip]="'tournaments.dashboard.calendarExportDialog.downloadTooltip' | transloco"
        tooltipPosition="top"
        (onClick)="onExport()"
      />
      <p-button
        type="button"
        icon="pi pi-calendar-plus"
        [label]="'tournaments.dashboard.calendarExportDialog.subscribe' | transloco"
        [pTooltip]="'tournaments.dashboard.calendarExportDialog.subscribeTooltip' | transloco"
        tooltipPosition="top"
        (onClick)="onSubscribe()"
      />
    </div>
  </div>
</form>
