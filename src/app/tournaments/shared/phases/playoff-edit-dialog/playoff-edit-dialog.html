<form (ngSubmit)="onSave()">
  <div class="mb-4">
    <p-floatlabel variant="on">
      <input
        pInputText
        id="playoff-name"
        class="w-full"
        autocomplete="off"
        [ngModel]="playoffName()"
        (ngModelChange)="playoffName.set($event)"
        name="playoff-name"
      />
      <label for="playoff-name">{{ 'playoffs.name' | transloco }}</label>
    </p-floatlabel>
  </div>

  <div class="mb-4 flex items-center gap-2">
    <p-toggleswitch
      [ngModel]="hiddenFromVisitors()"
      (ngModelChange)="hiddenFromVisitors.set($event)"
      inputId="playoff-hidden-from-visitors"
      name="playoff-hidden-from-visitors"
      data-testid="playoff-hidden-from-visitors-toggle"
    />
    <label for="playoff-hidden-from-visitors" class="cursor-pointer">
      {{ 'admin.poules.hideFromVisitors' | transloco }}
    </label>
  </div>

  <div class="p-dialog-footer px-0! mt-5 flex items-center">
    <p-button
      type="button"
      class="mr-auto"
      [label]="'shared.actions.delete' | transloco"
      severity="danger"
      [outlined]="true"
      icon="pi pi-trash"
      (onClick)="onDelete()"
      data-testid="delete-playoff-button"
    />
    <p-button
      type="button"
      [label]="'shared.actions.cancel' | transloco"
      severity="secondary"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="'shared.actions.save' | transloco"
      [disabled]="!playoffName().trim()"
    />
  </div>
</form>
