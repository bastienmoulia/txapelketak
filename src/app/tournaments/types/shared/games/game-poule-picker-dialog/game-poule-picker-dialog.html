<div class="flex flex-col gap-4 pt-2">
  <p-floatlabel variant="on">
    <p-select
      inputId="newSerie"
      [options]="sortedSeries()"
      [(ngModel)]="selectedSerie"
      optionLabel="name"
      [style]="{ width: '100%' }"
      appendTo="body"
      (onChange)="onSerieChange()"
    />
    <label for="newSerie">{{ 'admin.games.serie' | transloco }}</label>
  </p-floatlabel>
  <p-floatlabel variant="on">
    <p-select
      inputId="newPoule"
      [options]="poulesForSelectedSerie()"
      [(ngModel)]="selectedPoule"
      optionLabel="name"
      [style]="{ width: '100%' }"
      appendTo="body"
      [disabled]="!selectedSerie()"
    />
    <label for="newPoule">{{ 'admin.games.poule' | transloco }}</label>
  </p-floatlabel>
</div>

<div class="p-dialog-footer px-0! mt-5">
  <p-button
    [label]="'shared.actions.cancel' | transloco"
    severity="secondary"
    (onClick)="onCancel()"
  />
  <p-button
    [label]="'shared.actions.next' | transloco"
    [disabled]="isNextDisabled()"
    (onClick)="onNext()"
  />
</div>
