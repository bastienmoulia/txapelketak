<form (ngSubmit)="onSave()">
  <div class="mb-4">
    <p-floatlabel variant="on">
      <input
        pInputText
        id="serie-name"
        class="w-full"
        autocomplete="off"
        [ngModel]="serieName()"
        (ngModelChange)="serieName.set($event)"
        name="serie-name"
      />
      <label for="serie-name">{{ 'admin.poules.serieName' | transloco }}</label>
    </p-floatlabel>
  </div>

  <div class="p-dialog-footer px-0! mt-5 flex items-center">
    @if (data.isEditing) {
      <p-button
        type="button"
        class="mr-auto"
        [label]="'shared.actions.delete' | transloco"
        severity="danger"
        [outlined]="true"
        icon="pi pi-trash"
        [disabled]="!(data.canDelete ?? true)"
        (onClick)="onDelete()"
        data-testid="delete-serie-button"
      />
    }
    <p-button
      type="button"
      [label]="'shared.actions.cancel' | transloco"
      severity="secondary"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="'shared.actions.save' | transloco"
      [disabled]="!serieName().trim()"
    />
  </div>
</form>
