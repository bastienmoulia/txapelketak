<form (ngSubmit)="onSave()">
  <p-confirmdialog></p-confirmdialog>

  <div class="mb-4">
    <p-floatlabel variant="on">
      <input
        pInputText
        id="poule-name"
        class="w-full"
        autocomplete="off"
        [ngModel]="pouleName()"
        (ngModelChange)="pouleName.set($event)"
        name="poule-name"
      />
      <label for="poule-name">{{ 'admin.poules.pouleName' | transloco }}</label>
    </p-floatlabel>
  </div>

  @if (hasTeamManagement()) {
    <div class="mb-4">
      <h5 class="text-lg font-semibold mb-2">{{ 'admin.poules.teamsInPoule' | transloco }}</h5>

      <div class="flex gap-2 items-center mb-3">
        <p-select
          class="flex-1"
          [options]="availableTeams()"
          optionLabel="name"
          optionValue="ref"
          [placeholder]="'admin.poules.selectTeam' | transloco"
          [ngModel]="pendingTeamRef()"
          (ngModelChange)="pendingTeamRef.set($event)"
          name="team-select"
          appendTo="body"
          [showClear]="true"
        />
        <p-button
          type="button"
          severity="primary"
          icon="pi pi-plus"
          [label]="'admin.poules.addTeam' | transloco"
          [disabled]="!pendingTeamRef()"
          (onClick)="onAddSelectedTeam()"
          data-testid="dialog-add-team-button"
        />
      </div>

      @if (selectedTeams().length === 0) {
        <p-message severity="info" class="w-full" data-testid="dialog-no-team-message">
          {{ 'admin.poules.noTeamsInPoule' | transloco }}
        </p-message>
      } @else {
        <div class="flex flex-col gap-2" data-testid="dialog-team-list">
          @for (team of selectedTeams(); track team.ref.id) {
            <div
              class="flex items-center justify-between border border-surface-200 rounded px-3 py-2"
            >
              <span>{{ team.name }}</span>
              <p-button
                type="button"
                size="small"
                severity="danger"
                [outlined]="true"
                icon="pi pi-times"
                [ariaLabel]="'admin.poules.removeTeamAria' | transloco"
                [pTooltip]="'admin.poules.removeTeamAria' | transloco"
                tooltipPosition="top"
                (onClick)="onRequestRemoveTeam(team.ref)"
                data-testid="dialog-remove-team-button"
              />
            </div>
          }
        </div>
      }
    </div>
  }

  <div class="p-dialog-footer px-0! mt-5 flex items-center">
    @if (data.isEditing) {
      <p-button
        type="button"
        class="mr-auto"
        [label]="'shared.actions.delete' | transloco"
        severity="danger"
        [outlined]="true"
        icon="pi pi-trash"
        (onClick)="onDelete()"
        data-testid="delete-poule-button"
      />
    }
    <p-button
      type="button"
      [label]="'shared.actions.cancel' | transloco"
      severity="secondary"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="'shared.actions.save' | transloco"
      [disabled]="!pouleName().trim()"
    />
  </div>
</form>
