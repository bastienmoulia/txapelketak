<form (ngSubmit)="onSave()">
  <div class="mb-4">
    <p-floatlabel variant="on">
      <input
        pInputText
        id="poule-name"
        class="w-full"
        autocomplete="off"
        [ngModel]="pouleName()"
        (ngModelChange)="pouleName.set($event)"
        name="poule-name"
      />
      <label for="poule-name">{{ 'admin.poules.pouleName' | transloco }}</label>
    </p-floatlabel>
  </div>

  <div class="p-dialog-footer px-0! mt-5 flex items-center">
    @if (data.isEditing) {
      <p-button
        type="button"
        class="mr-auto"
        [label]="'shared.actions.delete' | transloco"
        severity="danger"
        [outlined]="true"
        icon="pi pi-trash"
        (onClick)="onDelete()"
        data-testid="delete-poule-button"
      />
    }
    <p-button
      type="button"
      [label]="'shared.actions.cancel' | transloco"
      severity="secondary"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="'shared.actions.save' | transloco"
      [disabled]="!pouleName().trim()"
    />
  </div>
</form>
