<div class="series-list">
  @for (serie of series(); track $index) {
    <p-card [header]="serie.name" class="series-card">
      @for (poule of serie.poules; track $index) {
        <p-card [header]="poule.name" class="poule-card">
          <ul class="teams-list">
            @for (refTeam of poule.refTeams; track $index) {
              <li class="team-item">{{ getTeamName | apply: refTeam : teams() }}</li>
            }
          </ul>
        </p-card>
      }
    </p-card>
  }
</div>
