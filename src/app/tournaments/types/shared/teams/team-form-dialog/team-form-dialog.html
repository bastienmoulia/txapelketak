<div class="mb-4">
  <p-floatlabel variant="on">
    <input pInputText [formField]="teamForm.name" id="name" class="w-full" autocomplete="off" />
    <label for="name">{{ 'shared.table.columns.name' | transloco }}</label>
  </p-floatlabel>
</div>

<div class="p-dialog-footer px-0! mt-5">
  <p-button [label]="'shared.actions.cancel' | transloco" severity="secondary" (onClick)="onCancel()" />
  <p-button [label]="'shared.actions.save' | transloco" [disabled]="!teamForm().valid()" (onClick)="onSave()" />
</div>
