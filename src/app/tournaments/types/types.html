@switch (tournament().type) {
  @case ('poules') {
    <app-poules [tournamentData]="poulesData()" />
  }
  @case ('finale') {
    <app-finale [tournamentData]="finaleData()" />
  }
  @case ('poules_finale') {
    <app-poules-finale [tournamentData]="poulesFinaleData()" />
  }
  @default {
    <p>{{ 'tournaments.types.unknown' | transloco }} : {{ tournament().type }}</p>
  }
}
