@switch (tournament().type) {
  @case ('poules') {
    <app-poules [tournament]="tournament()" />
  }
  @case ('finale') {
    <app-finale [tournament]="tournament()" />
  }
  @case ('poules_finale') {
    <app-poules-finale [tournament]="tournament()" />
  }
  @default {
    <p>{{ 'tournaments.types.unknown' | transloco }} : {{ tournament().type }}</p>
  }
}
